name: Build Shutdown Reminder Executable

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
            executable_suffix: .exe
            gui_version: true
          - os: ubuntu-latest
            platform: linux
            executable_suffix: ""
            gui_version: false
          - os: macos-latest
            platform: macos
            executable_suffix: ""
            gui_version: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        echo "Installing PyInstaller..."
        pip install pyinstaller
        echo "Verifying PyInstaller installation..."
        pyinstaller --version

    - name: Test imports
      run: |
        python -c "import datetime, threading, time, subprocess, platform, sys, signal, os; print('CLI imports successful')"
        if [ "${{ matrix.gui_version }}" = "true" ]; then
          python -c "import tkinter; print('GUI imports successful')" || echo "GUI not available, will build CLI version only"
        fi
      shell: bash

    - name: Run tests
      run: |
        echo "Running test suite..."
        python test_shutdown_reminder.py || {
          echo "Tests completed with warnings/errors"
          echo "This is expected on headless systems without GUI support"
        }
      continue-on-error: true

    - name: Validate Python scripts
      run: |
        echo "Validating Python scripts..."
        python -m py_compile shutdown_reminder_cli.py || exit 1
        python -m py_compile shutdown_reminder.py || exit 1
        python -m py_compile test_shutdown_reminder.py || exit 1
        echo "✅ All Python scripts compile successfully"

    - name: Build CLI executable
      run: |
        echo "Building CLI executable..."
        pyinstaller --onefile --name "shutdown-reminder-cli-${{ matrix.platform }}" --console --add-data "README.md:." shutdown_reminder_cli.py
        echo "CLI build completed"
      shell: bash

    - name: Build GUI executable
      if: matrix.gui_version == true
      run: |
        echo "Building GUI executable..."
        pyinstaller --onefile --name "shutdown-reminder-gui-${{ matrix.platform }}" --windowed --add-data "README.md:." shutdown_reminder.py || echo "GUI build failed, continuing with CLI only"
        echo "GUI build step completed"
      continue-on-error: true
      shell: bash

    - name: List built files
      run: |
        echo "Built files in dist/:"
        ls -la dist/ || echo "No dist directory found"
        echo "Working directory contents:"
        ls -la
      shell: bash

    - name: Verify build artifacts
      run: |
        echo "=== BUILD ARTIFACTS VERIFICATION ==="
        CLI_FILE="dist/shutdown-reminder-cli-${{ matrix.platform }}${{ matrix.executable_suffix }}"
        GUI_FILE="dist/shutdown-reminder-gui-${{ matrix.platform }}${{ matrix.executable_suffix }}"
        
        echo "Looking for CLI executable: $CLI_FILE"
        if [ -f "$CLI_FILE" ]; then
          echo "✅ CLI executable found ($(stat -c%s "$CLI_FILE" 2>/dev/null || stat -f%z "$CLI_FILE" 2>/dev/null || echo "unknown size") bytes)"
        else
          echo "❌ CLI executable NOT found"
          echo "Available files in dist/:"
          ls -la dist/ 2>/dev/null || echo "No dist directory"
          exit 1
        fi
        
        if [ "${{ matrix.gui_version }}" = "true" ]; then
          echo "Looking for GUI executable: $GUI_FILE"
          if [ -f "$GUI_FILE" ]; then
            echo "✅ GUI executable found ($(stat -c%s "$GUI_FILE" 2>/dev/null || stat -f%z "$GUI_FILE" 2>/dev/null || echo "unknown size") bytes)"
          else
            echo "⚠️ GUI executable not found (expected on some platforms)"
          fi
        fi
        echo "=== VERIFICATION COMPLETE ==="
      shell: bash

    - name: Test CLI executable (dry run)
      run: |
        echo "Testing CLI executable..."
        CLI_PATH="dist/shutdown-reminder-cli-${{ matrix.platform }}${{ matrix.executable_suffix }}"
        echo "Looking for executable at: $CLI_PATH"
        
        if [ -f "$CLI_PATH" ]; then
          echo "✅ CLI executable found"
          # Set executable permissions on Unix-like systems
          if [ "${{ runner.os }}" != "Windows" ]; then
            echo "Setting executable permissions..."
            chmod +x "$CLI_PATH"
          fi
          echo "Testing version command..."
          "$CLI_PATH" --version || echo "Version check completed with status $?"
        else
          echo "❌ CLI executable not found at $CLI_PATH"
          echo "Contents of dist/:"
          ls -la dist/ || echo "No dist directory"
          exit 1
        fi
      shell: bash
      continue-on-error: true

    - name: Upload CLI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shutdown-reminder-cli-${{ matrix.platform }}
        path: dist/shutdown-reminder-cli-${{ matrix.platform }}${{ matrix.executable_suffix }}
        if-no-files-found: error
        retention-days: 30

    - name: Verify CLI artifact upload
      run: |
        CLI_FILE="dist/shutdown-reminder-cli-${{ matrix.platform }}${{ matrix.executable_suffix }}"
        echo "Verifying CLI artifact before upload..."
        if [ -f "$CLI_FILE" ]; then
          echo "✅ CLI artifact verified for upload: $CLI_FILE"
          echo "File size: $(stat -c%s "$CLI_FILE" 2>/dev/null || stat -f%z "$CLI_FILE" 2>/dev/null || echo "unknown") bytes"
        else
          echo "❌ CLI artifact missing before upload!"
          exit 1
        fi
      shell: bash

    - name: Upload GUI artifacts
      if: matrix.gui_version == true
      uses: actions/upload-artifact@v4
      with:
        name: shutdown-reminder-gui-${{ matrix.platform }}
        path: dist/shutdown-reminder-gui-${{ matrix.platform }}${{ matrix.executable_suffix }}
        if-no-files-found: ignore
        retention-days: 30
      continue-on-error: true

    - name: Create release assets (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "Creating release assets..."
        mkdir -p release
        
        # Copy executables to release directory
        if [ -d "dist" ]; then
          echo "Copying files from dist/ to release/"
          find dist/ -name "*.exe" -o -name "shutdown-reminder-*" -type f | while read file; do
            echo "Copying: $file"
            cp "$file" release/ || echo "Failed to copy $file"
          done
        else
          echo "No dist directory found"
          exit 1
        fi
        
        echo "Release directory contents:"
        ls -la release/ || echo "Release directory is empty"
      shell: bash

    - name: Create Windows archive
      if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
      run: |
        Write-Host "Creating Windows ZIP archive..."
        $files = Get-ChildItem -Path "release" -File
        if ($files.Count -gt 0) {
          Compress-Archive -Path "release\*" -DestinationPath "shutdown-reminder-${{ matrix.platform }}.zip" -Force
          Write-Host "Created Windows archive:"
          Get-ChildItem -Name "*.zip"
        } else {
          Write-Host "No files found in release directory"
          exit 1
        }
      shell: powershell

    - name: Create Unix archive  
      if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
      run: |
        echo "Creating Unix TAR.GZ archive..."
        cd release
        if [ "$(ls -A .)" ]; then
          tar -czf ../shutdown-reminder-${{ matrix.platform }}.tar.gz *
          cd ..
          echo "Created Unix archive:"
          ls -la *.tar.gz
        else
          echo "No files found in release directory"
          exit 1
        fi
      shell: bash

    - name: Upload release assets
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.platform }}
        path: |
          shutdown-reminder-${{ matrix.platform }}.zip
          shutdown-reminder-${{ matrix.platform }}.tar.gz
        if-no-files-found: ignore
        retention-days: 90

    - name: Verify release assets
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "=== RELEASE ASSETS VERIFICATION ==="
        if [ "${{ runner.os }}" = "Windows" ]; then
          ARCHIVE_FILE="shutdown-reminder-${{ matrix.platform }}.zip"
        else
          ARCHIVE_FILE="shutdown-reminder-${{ matrix.platform }}.tar.gz"
        fi
        
        echo "Looking for release archive: $ARCHIVE_FILE"
        if [ -f "$ARCHIVE_FILE" ]; then
          echo "✅ Release archive found: $ARCHIVE_FILE"
          echo "Archive size: $(stat -c%s "$ARCHIVE_FILE" 2>/dev/null || stat -f%z "$ARCHIVE_FILE" 2>/dev/null || echo "unknown") bytes"
        else
          echo "❌ Release archive not found: $ARCHIVE_FILE"
          echo "Available files:"
          ls -la *.zip *.tar.gz 2>/dev/null || echo "No archive files found"
        fi
        echo "=== RELEASE VERIFICATION COMPLETE ==="
      shell: bash

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
        
    - name: List downloaded artifacts
      run: |
        echo "Downloaded artifacts:"
        find . -type f -name "*" | head -20
        echo "Looking for release files:"
        find . -name "*.zip" -o -name "*.tar.gz" | head -10

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## 定时关机提醒程序 Shutdown Reminder
          
          ### Features 功能
          - 🕒 Set custom reminder time 自定义提醒时间
          - 💻 Cross-platform support 跨平台支持
          - 🖥️ GUI and CLI versions GUI和命令行版本
          - ⚠️ Safe shutdown confirmation 安全关机确认
          - ⏰ Delay and cancel options 延迟和取消选项

          ### Downloads 下载
          - **Windows**: 下载 `shutdown-reminder-windows.zip`
          - **Linux**: 下载 `shutdown-reminder-linux.tar.gz`  
          - **macOS**: 下载 `shutdown-reminder-macos.tar.gz`

          ### Usage 使用方法
          1. 解压下载的文件
          2. 运行可执行文件
          3. 设置提醒时间
          4. 等待提醒并选择关机选项

          ⚠️ **Warning**: This application can shut down your computer. Use with caution.
          ⚠️ **警告**: 此应用程序可以关闭您的计算机，请谨慎使用。
        files: |
          **/*.zip
          **/*.tar.gz
        fail_on_unmatched_files: false